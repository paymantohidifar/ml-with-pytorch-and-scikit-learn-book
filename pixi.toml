[workspace]
authors = ["Payman Tohidifar <payman.tohidifar@gmail.com>"]
channels = ["conda-forge"]
name = "ml-with-pytorch-and-sklearn"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "1.0.0"

[environments]
default = { features = ["base", "ml", "dl"], no-default-feature = true }

[feature.base.dependencies]
python = "3.11.*"      
numpy = ">=2.1.0"      
pandas = ">=3.0.0"     
matplotlib = ">=3.10.0"
seaborn = ">=0.13.0"   
jupyterlab = ">=4.3.0"
pixi-kernel = "*"

[feature.ml.dependencies]
scipy = ">=1.13.0"     
scikit-learn = ">=1.8.0" 

[feature.dl.dependencies]
pytorch-cpu = ">=2.10.0" 
torchvision = ">=0.26.0" 


[feature.dl.pypi-dependencies]
tqdm = ">=4.67.3"
